<svg width="680" height="380" viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg">
<title>SentinelShield architecture</title>
<desc>Terraform provisions the AWS workload. Prowler scans it and feeds findings into a scored SQLite database. A prompt library generates remediation guidance, which splits into an auto-remediation Lambda for safe fixes and an approval-gate Lambda for higher-risk findings. Both write evidence to CloudWatch.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="40" y="70" width="135" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="107" y="90" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Terraform</text>
<text x="107" y="108" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#5F5E5A">AWS workload</text>

<rect x="190" y="70" width="135" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="257" y="90" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#04342C">Prowler scan</text>
<text x="257" y="108" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#085041">Scans &amp; detects</text>

<rect x="340" y="70" width="135" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="407" y="90" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#26215C">Findings DB</text>
<text x="407" y="108" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#3C3489">Scored &amp; ranked</text>

<rect x="490" y="70" width="135" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="557" y="90" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#26215C">Prompt library</text>
<text x="557" y="108" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#3C3489">LLM guidance</text>

<line x1="175" y1="98" x2="188" y2="98" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="325" y1="98" x2="338" y2="98" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="475" y1="98" x2="488" y2="98" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect x="110" y="190" width="180" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="200" y="210" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#4A1B0C">Auto-remediate</text>
<text x="200" y="228" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#712B13">3 safe fixes</text>

<rect x="390" y="190" width="180" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="480" y="210" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#4A1B0C">Approval gate</text>
<text x="480" y="228" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#712B13">5 flagged for review</text>

<path d="M540 128 L200 188" fill="none" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>
<path d="M560 128 L480 188" fill="none" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>

